<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarcasm Indicator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            overflow: hidden;
        }
        /* Main Menu Grid */
        .menu {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
        }
        .btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.1s ease;
        }
        .btn:active {
            opacity: 0.8;
        }
        .red-btn {
            background-color: #ff3b30;
        }
        .green-btn {
            background-color: #34c759;
        }
        .subtext {
            font-size: 1rem;
            opacity: 0.8;
            margin-top: 10px;
            font-weight: normal;
        }
        /* Fullscreen Overlay Mode */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 10;
            cursor: pointer;
        }
        /* Subtle hint for how to close */
        .overlay::after {
            content: "Tap anywhere to reset";
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 0.9rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Selection Screen -->
    <div id="mainMenu" class="menu">
        <div class="btn red-btn" onclick="showAlert('#ff3b30')">
            Sarcasm
            <span class="subtext">(Not Joking / Dead Serious)</span>
        </div>
        <div class="btn green-btn" onclick="showAlert('#34c759')">
            Serious
            <span class="subtext">(Actually Joking / Sarcastic)</span>
        </div>
    </div>

    <!-- Fullscreen Color Display -->
    <div id="colorOverlay" class="overlay" onclick="resetApp()"></div>

    <script>
        const menu = document.getElementById('mainMenu');
        const overlay = document.getElementById('colorOverlay');

        function showAlert(color) {
            overlay.style.backgroundColor = color;
            overlay.style.display = 'block';
            menu.style.display = 'none';
            
            // Attempt to trigger full screen lock if supported
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }

        function resetApp() {
            overlay.style.display = 'none';
            menu.style.display = 'grid';
            
            // Exit full screen if we entered it
            if (document.fullscreenElement && document.exitFullscreen) {
                document.exitFullscreen().catch(() => {});
            }
        }
    </script>
</body>
</html>
